<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Results</title>
  <style>
    :root {
      --bg: #f0ebf8;
      --card: #ffffff;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --purple: #673ab7;
      --purple-dark: #5b34a4;
      --purple-soft: #f3edff;
      --green: #188038;
      --error: #d93025;
      --shadow: 0 1px 2px rgba(60, 64, 67, 0.15), 0 2px 6px rgba(60, 64, 67, 0.12);
      --radius: 8px;
      --font: "Google Sans", "Roboto", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
    }

    .page {
      max-width: 960px;
      margin: 24px auto 56px;
      padding: 0 16px;
    }

    .header-card,
    .login-card,
    .panel-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header-topbar {
      height: 10px;
      background: var(--purple);
    }

    .header-main {
      padding: 20px 24px 0;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 400;
      line-height: 1.2;
    }

    .title-wrap p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .language-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }

    .language-switch button,
    .tab-btn,
    .primary-btn,
    .text-btn,
    .ghost-btn {
      border: none;
      font: inherit;
      cursor: pointer;
    }

    .language-switch button {
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
    }

    .language-switch button.active {
      background: var(--purple-soft);
      color: var(--purple-dark);
      font-weight: 500;
    }

    .ghost-btn,
    .primary-btn,
    .text-btn,
    .toolbar-link {
      border-radius: 4px;
      padding: 9px 14px;
      text-decoration: none;
      font-size: 14px;
    }

    .ghost-btn,
    .toolbar-link {
      background: transparent;
      color: var(--purple);
    }

    .primary-btn {
      background: var(--purple);
      color: #fff;
    }

    .text-btn {
      background: transparent;
      color: var(--purple);
    }

    .response-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--purple-soft);
      color: var(--purple-dark);
      font-size: 13px;
      font-weight: 500;
    }

    .tabs {
      display: flex;
      gap: 24px;
      padding: 0 24px;
      border-top: 1px solid var(--line);
      margin-top: 18px;
    }

    .tab-btn {
      padding: 14px 0 12px;
      background: transparent;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      font-weight: 500;
    }

    .tab-btn.active {
      color: var(--purple);
      border-bottom-color: var(--purple);
    }

    .content {
      margin-top: 18px;
      display: none;
    }

    .content.show {
      display: block;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .summary-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .summary-card strong {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .summary-card span {
      display: block;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 400;
    }

    .summary-card small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 12px;
    }

    .section-label {
      margin: 20px 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .question-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      padding: 18px 20px;
    }

    .question-card h3 {
      margin: 0;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.55;
    }

    .question-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar-list {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .bar-row {
      display: grid;
      gap: 8px;
    }

    .bar-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #ece6f6;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--purple);
    }

    .text-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .text-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fff;
    }

    .text-item strong {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .text-item p {
      margin: 0;
      line-height: 1.6;
      white-space: pre-line;
    }

    .control-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .control-row select {
      flex: 1;
      min-width: 0;
      padding: 11px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .individual-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .individual-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .individual-header h3 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 400;
    }

    .individual-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }

    .answer-list {
      padding: 0 20px;
    }

    .answer-item {
      padding: 18px 0;
      border-bottom: 1px solid #eceff1;
    }

    .answer-item:last-child {
      border-bottom: none;
    }

    .answer-item strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }

    .answer-item div {
      color: var(--ink);
      line-height: 1.7;
      white-space: pre-line;
    }

    .login-card {
      max-width: 440px;
      margin: 28px auto 0;
      padding: 22px 24px 24px;
    }

    .login-card h2 {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 400;
    }

    .login-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .field input:focus,
    .control-row select:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(103, 58, 183, 0.1);
    }

    .status {
      min-height: 20px;
      margin: 10px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--green);
    }

    .empty {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .page {
        margin-top: 16px;
        padding: 0 10px 32px;
      }

      .header-main,
      .tabs,
      .login-card,
      .question-card,
      .individual-header,
      .answer-list {
        padding-left: 16px;
        padding-right: 16px;
      }

      .header-row,
      .tools,
      .control-row {
        flex-direction: column;
        align-items: stretch;
      }

      .tools {
        justify-content: flex-start;
      }

      .summary-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="header-card">
      <div class="header-topbar"></div>
      <div class="header-main">
        <div class="header-row">
          <div class="title-wrap">
            <h1 id="pageTitle"></h1>
            <p id="pageSubtitle"></p>
            <div class="response-chip" id="responseChip"></div>
          </div>
          <div class="tools">
            <div class="language-switch">
              <button type="button" data-lang="en" class="active">English</button>
              <button type="button" data-lang="vi">Tiếng Việt</button>
            </div>
            <button type="button" class="ghost-btn" id="refreshBtn"></button>
            <button type="button" class="ghost-btn" id="logoutBtn"></button>
            <a class="toolbar-link" href="index.html" id="surveyLink"></a>
          </div>
        </div>
      </div>
      <div class="tabs" id="tabs" style="display:none;">
        <button type="button" class="tab-btn active" data-view="summary" id="tabSummary"></button>
        <button type="button" class="tab-btn" data-view="question" id="tabQuestion"></button>
        <button type="button" class="tab-btn" data-view="individual" id="tabIndividual"></button>
      </div>
    </section>

    <section class="login-card" id="loginCard">
      <h2 id="loginTitle"></h2>
      <p id="loginText"></p>
      <form id="loginForm">
        <div class="field">
          <label for="username" id="usernameLabel"></label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password" id="passwordLabel"></label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="primary-btn" id="loginBtn"></button>
        <div class="status" id="loginStatus" aria-live="polite"></div>
      </form>
    </section>

    <section id="dashboardShell" style="display:none;">
      <div class="summary-row" id="summaryRow"></div>

      <section class="content show" id="summaryView"></section>

      <section class="content" id="questionView">
        <div class="panel-card" style="padding:16px 18px; margin-bottom:16px;">
          <div class="control-row">
            <select id="questionSelect"></select>
          </div>
        </div>
        <div id="questionDetailMount"></div>
      </section>

      <section class="content" id="individualView">
        <div class="panel-card" style="padding:16px 18px; margin-bottom:16px;">
          <div class="control-row">
            <select id="responseSelect"></select>
          </div>
        </div>
        <div id="individualDetailMount"></div>
      </section>
    </section>
  </main>

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDateTime(value) {
      if (!value) return "-";
      try {
        return new Intl.DateTimeFormat(currentLang === "vi" ? "vi-VN" : "en-US", {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(new Date(value));
      } catch (error) {
        return value;
      }
    }

    function formatPercent(count, total) {
      if (!total) return "0%";
      const value = (count / total) * 100;
      return `${value.toFixed(value % 1 === 0 ? 0 : 1)}%`;
    }

    function translateOption(optionsKey, value) {
      const set = OPTION_SETS[optionsKey];
      if (!set || !set[value]) return value == null ? "-" : String(value);
      return set[value][currentLang] || set[value].en;
    }

    function buildResponseFieldText(id, stats) {
      const meta = getMeta(id);
      const values = (stats.responses || [])
        .map((response) => {
          const value = response[meta.field];
          if (value === null || value === undefined || value === "") return null;
          return {
            label: meta.isAge ? String(value) : String(value),
            submittedAt: response.submittedAt,
            responseId: response.id
          };
        })
        .filter(Boolean);

      return {
        type: "text",
        responseCount: values.length,
        items: values
      };
    }

    function buildResponseFieldSingle(id, stats) {
      const meta = getMeta(id);
      const counts = {};
      (stats.responses || []).forEach((response) => {
        const value = response[meta.field];
        if (!value) return;
        counts[value] = (counts[value] || 0) + 1;
      });

      return {
        type: "single",
        responseCount: stats.totalResponses || 0,
        optionCounts: counts,
        optionsKey: meta.optionsKey
      };
    }

    function getQuestionData(id, stats) {
      const meta = getMeta(id);
      if (!meta) return null;

      if (meta.source === "response_text") {
        return buildResponseFieldText(id, stats);
      }

      if (meta.source === "response_single") {
        return buildResponseFieldSingle(id, stats);
      }

      const raw = stats.questions && stats.questions[id] ? stats.questions[id] : null;
      if (!raw) {
        return {
          type: meta.type,
          responseCount: 0,
          optionCounts: {},
          textResponses: [],
          average: null,
          selectionCount: 0
        };
      }

      return {
        type: meta.type,
        responseCount: raw.responseCount || 0,
        optionCounts: raw.optionCounts || {},
        textResponses: raw.textResponses || [],
        average: raw.average,
        selectionCount: raw.selectionCount || 0,
        optionsKey: meta.optionsKey
      };
    }

    function renderBarCard(title, data) {
      const denominator = data.responseCount || 0;
      const optionsKey = data.optionsKey;
      const set = OPTION_SETS[optionsKey] || {};
      const orderedKeys = Object.keys(set);
      const remainingKeys = Object.keys(data.optionCounts || {}).filter((key) => !orderedKeys.includes(key));
      const keys = [...orderedKeys, ...remainingKeys].filter((key) => (data.optionCounts[key] || 0) > 0 || orderedKeys.includes(key));

      if (!denominator) {
        return `
          <article class="question-card">
            <h3>${escapeHtml(title)}</h3>
            <div class="question-meta">${escapeHtml(UI[currentLang].states.noQuestionData)}</div>
          </article>
        `;
      }

      return `
        <article class="question-card">
          <h3>${escapeHtml(title)}</h3>
          <div class="question-meta">${denominator} ${escapeHtml(UI[currentLang].meta.responses)}</div>
          <div class="bar-list">
            ${keys.map((key) => {
              const count = data.optionCounts[key] || 0;
              const percent = denominator ? (count / denominator) * 100 : 0;
              return `
                <div class="bar-row">
                  <div class="bar-head">
                    <span>${escapeHtml(translateOption(optionsKey, key))}</span>
                    <span>${count} (${formatPercent(count, denominator)})</span>
                  </div>
                  <div class="bar-track">
                    <div class="bar-fill" style="width:${percent}%;"></div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </article>
      `;
    }

        return renderTextCard(title, data);
      }

      if (data.type === "scale") {
        return renderScaleCard(title, data);
      }

      if (data.type === "single" || data.type === "multi") {
        return renderBarCard(title, data);
      }

      if (data.type === "text") {
        return renderTextCard(title, data);
      }

      return renderTextCard(title, data);
    }

    function renderSummaryCards(stats) {
      document.getElementById("summaryRow").innerHTML = `
        <div class="summary-card">
          <strong>${escapeHtml(UI[currentLang].summary.total)}</strong>
          <span>${stats.totalResponses || 0}</span>
          <small>${escapeHtml(UI[currentLang].meta.updated)}: ${escapeHtml(formatDateTime(stats.generatedAt))}</small>
        </div>
        <div class="summary-card">
          <strong>${escapeHtml(UI[currentLang].summary.parent)}</strong>
          <span>${stats.routeCounts.parent || 0}</span>
          <small>${escapeHtml(translateRoute("parent"))}</small>
        </div>
        <div class="summary-card">
          <strong>${escapeHtml(UI[currentLang].summary.teacher)}</strong>
          <span>${stats.routeCounts.teacher || 0}</span>
          <small>${escapeHtml(translateRoute("teacher"))}</small>
        </div>
        <div class="summary-card">
          <strong>${escapeHtml(UI[currentLang].summary.general)}</strong>
          <span>${stats.routeCounts.general || 0}</span>
          <small>${escapeHtml(UI[currentLang].meta.averageAge)}: ${escapeHtml(String(stats.ageSummary.average || 0))}</small>
        </div>
      `;
    }

    function renderSummaryView(stats) {
      const mount = document.getElementById("summaryView");
      if (!stats.totalResponses) {
        mount.innerHTML = `<div class="empty">${escapeHtml(UI[currentLang].states.noResponses)}</div>`;
        return;
      }

      mount.innerHTML = SECTIONS.map((section) => `
        <div class="section-label">${escapeHtml(UI[currentLang].sections[section.key])}</div>
        ${section.ids.map((id) => renderQuestionCard(id, stats)).join("")}
      `).join("");
    }

    function fillQuestionSelect() {
      const select = document.getElementById("questionSelect");
      select.innerHTML = ALL_QUESTION_IDS.map((id) => `
        <option value="${id}" ${id === selectedQuestionId ? "selected" : ""}>${escapeHtml(questionLabel(id))}</option>
      `).join("");
    }

    function renderQuestionView(stats) {
      fillQuestionSelect();
      document.getElementById("questionDetailMount").innerHTML = renderQuestionCard(selectedQuestionId, stats);
    }

    function fillResponseSelect(stats) {
      const select = document.getElementById("responseSelect");
      const responses = stats.responses || [];
      if (!responses.length) {
        select.innerHTML = "";
        return;
      }

      if (selectedResponseId == null) {
        selectedResponseId = responses[0].id;
      }

      select.innerHTML = responses.map((response, index) => `
        <option value="${response.id}" ${response.id === selectedResponseId ? "selected" : ""}>
          ${escapeHtml(`${UI[currentLang].meta.response} ${responses.length - index} - ${response.name} - ${formatDateTime(response.submittedAt)}`)}
        </option>
      `).join("");
    }

    function formatIndividualAnswer(id, response) {
      if (id === "basic_name") return response.name || "-";
      if (id === "basic_gender") {
        const base = translateOption("gender", response.genderKey);
        return response.genderKey === "other" && response.genderOther ? `${base}: ${response.genderOther}` : base;
      }
      if (id === "basic_age") return response.age == null ? "-" : String(response.age);
      if (id === "basic_role") {
        const base = translateOption("role", response.roleKey);
        return response.roleKey === "other" && response.roleOther ? `${base}: ${response.roleOther}` : base;
      }

      const meta = getMeta(id);
      if (!meta) return "-";
      const raw = response.answers ? response.answers[id] : null;
      if (raw == null || raw === "") return "-";
      if (Array.isArray(raw)) {
        return raw.map((item) => translateOption(meta.optionsKey, item)).join(", ");
      }
      if (meta.type === "text") return String(raw);
      return translateOption(meta.optionsKey, raw);
    }

    function renderIndividualView(stats) {
      const responses = stats.responses || [];
      fillResponseSelect(stats);

      if (!responses.length) {
        document.getElementById("individualDetailMount").innerHTML = `<div class="empty">${escapeHtml(UI[currentLang].states.noResponses)}</div>`;
        return;
      }

      const response = responses.find((item) => item.id === Number(selectedResponseId)) || responses[0];
      const order = RESPONSE_ORDER[response.route] || RESPONSE_ORDER.general;

      document.getElementById("individualDetailMount").innerHTML = `
        <article class="individual-card">
          <div class="individual-header">
            <h3>${escapeHtml(response.name)}</h3>
            <p>
              ${escapeHtml(UI[currentLang].meta.route)}: ${escapeHtml(translateRoute(response.route))}<br>
              ${escapeHtml(UI[currentLang].meta.language)}: ${escapeHtml((response.language || "").toUpperCase())}<br>
              ${escapeHtml(UI[currentLang].meta.submitted)}: ${escapeHtml(formatDateTime(response.submittedAt))}
            </p>
          </div>
          <div class="answer-list">
            ${order.map((id) => `
              <div class="answer-item">
                <strong>${escapeHtml(questionLabel(id))}</strong>
                <div>${escapeHtml(formatIndividualAnswer(id, response))}</div>
              </div>
            `).join("")}
          </div>
        </article>
      `;
    }

    function renderDashboard(stats) {
      statsData = stats;
      document.getElementById("responseChip").textContent = `${UI[currentLang].responseChip}: ${stats.totalResponses || 0}`;
      renderSummaryCards(stats);
      renderSummaryView(stats);
      renderQuestionView(stats);
      renderIndividualView(stats);
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll(".tab-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.view === view);
      });
      document.querySelectorAll(".content").forEach((section) => {
        section.classList.toggle("show", section.id === `${view}View`);
      });
    }

    async function loadDashboard(showLoginMessage) {
      if (!getAdminToken()) {
        document.getElementById("dashboardShell").style.display = "none";
        document.getElementById("loginCard").style.display = "";
        document.getElementById("tabs").style.display = "none";
        if (showLoginMessage) {
          setLoginStatus("", "");
        }
        return;
      }

      if (showLoginMessage) {
        setLoginStatus(UI[currentLang].states.loading, "");
      }

      try {
        const response = await fetch(`${CONVEX_HTTP_URL}/getStats`, {
          headers: authHeaders()
        });
        const result = await response.json();

        if (response.status === 401) {
          clearAdminToken();
          document.getElementById("dashboardShell").style.display = "none";
          document.getElementById("loginCard").style.display = "";
          document.getElementById("tabs").style.display = "none";
          if (showLoginMessage) {
            setLoginStatus("", "");
          }
          return;
        }

        if (!response.ok || !result.success) {
          throw new Error(result.message || UI[currentLang].states.dashboardFailed);
        }

        document.getElementById("loginCard").style.display = "none";
        document.getElementById("dashboardShell").style.display = "";
        document.getElementById("tabs").style.display = "flex";
        setLoginStatus("", "");
        renderDashboard(result.stats);
        switchView(currentView);
      } catch (error) {
        if (showLoginMessage) {
          setLoginStatus(error.message || UI[currentLang].states.dashboardFailed, "error");
        }
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      setLoginStatus(UI[currentLang].login.loading, "");

      const formData = new FormData(event.currentTarget);
      try {
        const response = await fetch(`${CONVEX_HTTP_URL}/adminLogin`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: formData.get("username"),
            password: formData.get("password")
          })
        });

        const result = await response.json();
        if (!response.ok || !result.success) {
          throw new Error(result.message || UI[currentLang].login.failed);
        }

        setAdminToken(result.token || "");
        setLoginStatus("", "");
        await loadDashboard(false);
      } catch (error) {
        setLoginStatus(error.message || UI[currentLang].login.failed, "error");
      }
    }

    async function handleLogout() {
      try {
        await fetch(`${CONVEX_HTTP_URL}/adminLogout`, {
          method: "POST",
          headers: authHeaders()
        });
      } catch (error) {
      }

      clearAdminToken();
      statsData = null;
      document.getElementById("dashboardShell").style.display = "none";
      document.getElementById("tabs").style.display = "none";
      document.getElementById("loginCard").style.display = "";
      setLoginStatus(UI[currentLang].login.loggedOut, "success");
    }

    document.getElementById("loginForm").addEventListener("submit", handleLogin);
    document.getElementById("refreshBtn").addEventListener("click", () => loadDashboard(false));
    document.getElementById("logoutBtn").addEventListener("click", handleLogout);
    document.querySelectorAll(".tab-btn").forEach((button) => {
      button.addEventListener("click", () => switchView(button.dataset.view));
    });
    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => {
        currentLang = button.dataset.lang;
        applyStaticText();
        if (statsData) {
          renderDashboard(statsData);
          switchView(currentView);
        }
      });
    });
    document.getElementById("questionSelect").addEventListener("change", (event) => {
      selectedQuestionId = event.target.value;
      if (statsData) renderQuestionView(statsData);
    });
    document.getElementById("responseSelect").addEventListener("change", (event) => {
      selectedResponseId = Number(event.target.value);
      if (statsData) renderIndividualView(statsData);
    });

    applyStaticText();
    loadDashboard(false);
  </script>
</body>
</html>
