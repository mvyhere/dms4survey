<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Reading App for Children with ASD - User Research Survey</title>
  <style>
    :root {
      --bg: #f0ebf8;
      --card: #ffffff;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --purple: #673ab7;
      --purple-dark: #5b34a4;
      --purple-soft: #f3edff;
      --error: #d93025;
      --shadow: 0 1px 2px rgba(60, 64, 67, 0.15), 0 2px 6px rgba(60, 64, 67, 0.12);
      --radius: 8px;
      --font: "Google Sans", "Roboto", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
    }

    .page {
      max-width: 780px;
      margin: 24px auto 56px;
      padding: 0 16px;
    }

    .form-shell,
    .success-shell {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .form-top {
      height: 10px;
      background: var(--purple);
    }

    .form-header {
      padding: 20px 24px 24px;
      border-bottom: 1px solid var(--line);
    }

    .header-tools {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .language-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }

    .language-switch button {
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
    }

    .language-switch button.active {
      background: var(--purple-soft);
      color: var(--purple-dark);
      font-weight: 500;
    }

    .form-title {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 400;
      line-height: 1.2;
    }

    .form-description {
      margin: 0;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-line;
    }

    .questions {
      padding: 0 24px;
    }

    .question {
      padding: 24px 0;
      border-bottom: 1px solid #eceff1;
    }

    .question:last-child {
      border-bottom: none;
    }

    .question-title {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
    }

    .text-input,
    .text-area {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-bottom: 1px solid #9aa0a6;
      border-radius: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
    }

    .text-input:focus,
    .text-area:focus {
      outline: none;
      border-bottom: 2px solid var(--purple);
      padding-bottom: 9px;
    }

    .text-area {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    .choice-list {
      display: grid;
      gap: 12px;
    }

    .choice {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 15px;
      line-height: 1.55;
      cursor: pointer;
    }

    .choice input {
      margin-top: 2px;
      accent-color: var(--purple);
      flex-shrink: 0;
    }

    .other-input {
      margin-top: 10px;
      display: none;
    }

    .other-input.show {
      display: block;
    }

    .scale-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .scale-option {
      border: 1px solid var(--line);
      border-radius: 999px;
      text-align: center;
      padding: 10px 6px;
      cursor: pointer;
      font-size: 15px;
      color: var(--ink);
    }

    .scale-option input {
      display: none;
    }

    .scale-option.active {
      border-color: var(--purple);
      background: var(--purple-soft);
      color: var(--purple-dark);
      font-weight: 500;
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 20px 24px 24px;
      border-top: 1px solid var(--line);
    }

    .primary-btn,
    .text-btn,
    .popup-option {
      border: none;
      font: inherit;
      cursor: pointer;
    }

    .primary-btn {
      padding: 10px 22px;
      border-radius: 4px;
      background: var(--purple);
      color: #fff;
      font-weight: 500;
    }

    .primary-btn:hover {
      background: var(--purple-dark);
    }

    .text-btn {
      background: transparent;
      color: var(--purple);
      padding: 10px 6px;
      font-weight: 500;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .status.error {
      color: var(--error);
    }

    .success-shell {
      display: none;
      padding: 28px 24px;
    }

    .success-shell.show {
      display: block;
    }

    .success-shell h2 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 400;
    }

    .success-shell p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(32, 33, 36, 0.42);
    }

    .overlay.hidden {
      display: none;
    }

    .overlay-card {
      width: 100%;
      max-width: 430px;
      padding: 24px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(32, 33, 36, 0.22);
      text-align: center;
    }

    .overlay-card h2 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 400;
    }

    .overlay-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.65;
      white-space: pre-line;
    }

    .popup-options {
      display: grid;
      gap: 12px;
    }

    .popup-option {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 14px 16px;
    }

    .popup-option:hover {
      border-color: var(--purple);
      background: #faf7ff;
    }

    @media (max-width: 640px) {
      .page {
        margin-top: 16px;
        padding: 0 10px 32px;
      }

      .form-header,
      .questions,
      .actions,
      .success-shell {
        padding-left: 16px;
        padding-right: 16px;
      }

      .actions {
        flex-wrap: wrap;
      }

      .form-title {
        font-size: 27px;
      }

      .scale-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="overlay" id="languageOverlay">
    <div class="overlay-card">
      <h2>Select language</h2>
      <p>Choose a language to start the survey.
Chọn ngôn ngữ để bắt đầu khảo sát.</p>
      <div class="popup-options">
        <button class="popup-option" type="button" data-start-lang="en">English</button>
        <button class="popup-option" type="button" data-start-lang="vi">Tiếng Việt</button>
      </div>
    </div>
  </div>

  <main class="page">
    <section class="form-shell" id="formShell">
      <div class="form-top"></div>
      <div class="form-header">
        <div class="header-tools">
          <div class="language-switch">
            <button type="button" data-lang="en" class="active">English</button>
            <button type="button" data-lang="vi">Tiếng Việt</button>
          </div>
        </div>
        <h1 class="form-title" id="formTitle"></h1>
        <p class="form-description" id="formDescription"></p>
      </div>

      <form id="surveyForm" novalidate>
        <div class="questions" id="questionMount"></div>
        <div class="actions">
          <button type="submit" class="primary-btn" id="submitBtn"></button>
          <button type="button" class="text-btn" id="clearBtn"></button>
          <div class="status" id="statusMessage" aria-live="polite"></div>
        </div>
      </form>
    </section>

    <section class="success-shell" id="successShell">
      <h2 id="successTitle"></h2>
      <p id="successText"></p>
      <button type="button" class="primary-btn" id="anotherBtn"></button>
    </section>
  </main>

    const languageOverlay = document.getElementById("languageOverlay");

    function t(value) {
      return typeof value === "string" ? value : value[currentLang] || value.en;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getRoute(roleKey) {
      if (roleKey === "parent_caregiver") return "parent";
      if (roleKey === "teacher_educator" || roleKey === "therapist_specialist") return "teacher";
      if (roleKey) return "general";
      return null;
    }

    function getValues() {
      const values = {};
      surveyForm.querySelectorAll("[name]").forEach((field) => {
        if (field.type === "checkbox") {
          if (!values[field.name]) values[field.name] = [];
          if (field.checked) values[field.name].push(field.value);
          return;
        }

        if (field.type === "radio") {
          if (field.checked) values[field.name] = field.value;
          return;
        }

        values[field.name] = field.value;
      });
      return values;
    }

    function updateHeader() {
      const copy = UI_TEXT[currentLang];
      document.getElementById("formTitle").textContent = copy.title;
      document.getElementById("formDescription").textContent = copy.description;
      document.getElementById("submitBtn").textContent = copy.submit;
      document.getElementById("clearBtn").textContent = copy.clear;
      document.getElementById("successTitle").textContent = copy.successTitle;
      document.getElementById("successText").textContent = copy.successText;
      document.getElementById("anotherBtn").textContent = copy.another;

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === currentLang);
      });
    }

    function renderTextQuestion(question, number, values) {
      return `
        <div class="question">
          <p class="question-title">${number}. ${escapeHtml(t(question.title))}</p>
          <input
            class="text-input"
            type="${question.type === "number" ? "number" : "text"}"
            name="${question.key}"
            value="${escapeHtml(values[question.key] || "")}"
            placeholder="${escapeHtml(UI_TEXT[currentLang].placeholders.answer)}"
            ${question.required ? "required" : ""}
            ${question.type === "number" ? 'inputmode="numeric"' : ""}
          >
        </div>
      `;
    }

    function renderChoiceQuestion(question, number, values) {
      const options = OPTION_SETS[question.optionsKey];
      const isCheckbox = question.type === "checkbox";
      const selected = isCheckbox
        ? (Array.isArray(values[question.key]) ? values[question.key] : [])
        : [values[question.key]];
      const showOther = question.otherField && values[question.key] === "other";

      return `
        <div class="question">
          <p class="question-title">${number}. ${escapeHtml(t(question.title))}</p>
          <div class="choice-list">
            ${options.map((option, index) => `
              <label class="choice">
                <input
                  type="${isCheckbox ? "checkbox" : "radio"}"
                  name="${question.key}"
                  value="${option.key}"
                  ${selected.includes(option.key) ? "checked" : ""}
                  ${question.required && !isCheckbox && index === 0 ? "required" : ""}
                  ${question.maxSelections ? `data-max="${question.maxSelections}"` : ""}
                >
                <span>${escapeHtml(t(option.label))}</span>
              </label>
            `).join("")}
          </div>
          ${question.otherField ? `
            <div class="other-input ${showOther ? "show" : ""}" data-other-for="${question.key}">
              <input
                class="text-input"
                type="text"
                name="${question.otherField.key}"
                value="${escapeHtml(values[question.otherField.key] || "")}"
                placeholder="${escapeHtml(UI_TEXT[currentLang].placeholders.specify)}"
                ${showOther ? "required" : ""}
              >
            </div>
          ` : ""}
        </div>
      `;
    }

    function renderScaleQuestion(question, number, values) {
      const current = String(values[question.key] || "");
      return `
        <div class="question">
          <p class="question-title">${number}. ${escapeHtml(t(question.title))}</p>
          <div class="scale-list">
            ${[1, 2, 3, 4, 5].map((score, index) => `
              <label class="scale-option ${current === String(score) ? "active" : ""}">
                <input
                  type="radio"
                  name="${question.key}"
                  value="${score}"
                  ${current === String(score) ? "checked" : ""}
                  ${question.required && index === 0 ? "required" : ""}
                >
                <span>${score}</span>
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderTextarea(question, number, values) {
      return `
        <div class="question">
          <p class="question-title">${number}. ${escapeHtml(t(question.title))}</p>
          <textarea class="text-area" name="${question.key}" placeholder="${escapeHtml(UI_TEXT[currentLang].placeholders.answer)}">${escapeHtml(values[question.key] || "")}</textarea>
        </div>
      `;
    }

    function renderQuestion(question, number, values) {
      if (question.type === "text" || question.type === "number") {
        return renderTextQuestion(question, number, values);
      }
      if (question.type === "radio" || question.type === "checkbox") {
        return renderChoiceQuestion(question, number, values);
      }
      if (question.type === "scale") {
        return renderScaleQuestion(question, number, values);
      }
      if (question.type === "textarea") {
        return renderTextarea(question, number, values);
      }
      return "";
    }

    function getActiveQuestions(roleKey) {
      const route = getRoute(roleKey);
      const routeQuestions = route ? ROUTE_QUESTIONS[route] : [];
      return BASIC_QUESTIONS.concat(routeQuestions);
    }

    function renderForm(values = {}) {
      const questions = getActiveQuestions(values.role || "");
      questionMount.innerHTML = questions.map((question, index) => renderQuestion(question, index + 1, values)).join("");
      bindInputs();
    }

    function clearStatus() {
      statusMessage.className = "status";
      statusMessage.textContent = "";
    }

    function showStatus(message, isError) {
      statusMessage.className = isError ? "status error" : "status";
      statusMessage.textContent = message;
    }

    function toggleOtherFields() {
      ["gender", "role"].forEach((key) => {
        const wrapper = surveyForm.querySelector(`[data-other-for="${key}"]`);
        if (!wrapper) return;
        const values = getValues();
        const input = wrapper.querySelector("input");
        const active = values[key] === "other";
        wrapper.classList.toggle("show", active);
        if (input) input.required = active;
      });
    }

    function updateScaleStyles() {
      surveyForm.querySelectorAll(".scale-option").forEach((label) => {
        const input = label.querySelector("input");
        label.classList.toggle("active", !!input && input.checked);
      });
    }

    function enforceCheckboxLimit(input) {
      const max = Number(input.dataset.max || 0);
      if (!max) return;
      const group = Array.from(surveyForm.querySelectorAll(`input[name="${input.name}"]`));
      const checked = group.filter((item) => item.checked);
      if (checked.length > max) {
        input.checked = false;
        showStatus(UI_TEXT[currentLang].errors.checkboxLimit, true);
      } else if (statusMessage.classList.contains("error")) {
        clearStatus();
      }
    }

    function bindInputs() {
      toggleOtherFields();
      updateScaleStyles();

      surveyForm.querySelectorAll('input[name="role"]').forEach((input) => {
        input.addEventListener("change", () => {
          const values = getValues();
          renderForm(values);
          clearStatus();
        });
      });

      surveyForm.querySelectorAll('input[name="gender"], input[name="role"]').forEach((input) => {
        input.addEventListener("change", toggleOtherFields);
      });

      surveyForm.querySelectorAll('input[type="checkbox"][data-max]').forEach((input) => {
        input.addEventListener("change", () => enforceCheckboxLimit(input));
      });

      surveyForm.querySelectorAll(".scale-option input").forEach((input) => {
        input.addEventListener("change", updateScaleStyles);
      });
    }

    function validateCheckboxes(route, values) {
      const questions = getActiveQuestions(values.role || "").filter((question) => question.type === "checkbox");
      for (const question of questions) {
        const selected = Array.isArray(values[question.key]) ? values[question.key] : [];
        if (question.required && selected.length === 0) {
          showStatus(UI_TEXT[currentLang].errors.checkboxRequired, true);
          return false;
        }
        if (question.maxSelections && selected.length > question.maxSelections) {
          showStatus(UI_TEXT[currentLang].errors.checkboxLimit, true);
          return false;
        }
      }
      return true;
    }

    function buildPayload() {
      const values = getValues();
      const route = getRoute(values.role || "");

      if (!route) {
        showStatus(UI_TEXT[currentLang].errors.routeRequired, true);
        return null;
      }

      if (values.age && Number.isNaN(Number(values.age))) {
        showStatus(UI_TEXT[currentLang].errors.ageNumber, true);
        return null;
      }

      if (!validateCheckboxes(route, values)) {
        return null;
      }

      const payload = {
        language: currentLang,
        name: values.name || "",
        gender: values.gender || "",
        gender_other: values.gender_other || "",
        age: values.age || "",
        role: values.role || "",
        role_other: values.role_other || "",
        answers: {}
      };

      ROUTE_QUESTIONS[route].forEach((question) => {
        if (question.type === "checkbox") {
          payload.answers[question.key] = Array.isArray(values[question.key]) ? values[question.key] : [];
          return;
        }
        payload.answers[question.key] = values[question.key] || "";
      });

      return payload;
    }

    async function handleSubmit(event) {
      event.preventDefault();
      if (submitting) return;

      clearStatus();
      if (!surveyForm.reportValidity()) return;

      const payload = buildPayload();
      if (!payload) return;

      submitting = true;

      try {
        const response = await fetch(`${CONVEX_HTTP_URL}/submitSurvey`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!response.ok || !result.success) {
          throw new Error(result.message || UI_TEXT[currentLang].errors.submitFailed);
        }

        formShell.style.display = "none";
        successShell.classList.add("show");
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (error) {
        showStatus(error.message || UI_TEXT[currentLang].errors.submitFailed, true);
      } finally {
        submitting = false;
      }
    }

    function resetSurvey() {
      clearStatus();
      surveyForm.reset();
      renderForm({});
    }

    function switchLanguage(lang) {
      const values = getValues();
      currentLang = lang;
      updateHeader();
      renderForm(values);
      clearStatus();
    }

    function startSurvey(lang) {
      started = true;
      currentLang = lang;
      languageOverlay.classList.add("hidden");
      updateHeader();
      renderForm(getValues());
    }

    surveyForm.addEventListener("submit", handleSubmit);
    document.getElementById("clearBtn").addEventListener("click", resetSurvey);
    document.getElementById("anotherBtn").addEventListener("click", () => {
      successShell.classList.remove("show");
      formShell.style.display = "";
      resetSurvey();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.querySelectorAll("[data-start-lang]").forEach((button) => {
      button.addEventListener("click", () => startSurvey(button.dataset.startLang));
    });

    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => {
        if (!started) {
          startSurvey(button.dataset.lang);
          return;
        }
        switchLanguage(button.dataset.lang);
      });
    });

    updateHeader();
    renderForm({});
  </script>
</body>
</html>
